<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCI Speller MVP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Pre-connection Modal -->
    <div id="connection-modal" class="modal">
        <div class="modal-content">
            <h2>BCI Neural Speller Setup</h2>
            <div class="form-group">
                <label for="ws-url">WebSocket URL:</label>
                <input type="text" id="ws-url" value="ws://localhost:8765">
            </div>
            <div class="form-group">
                <label for="context-selector">LLM Context (Task Persona):</label>
                <select id="context-selector">
                    <option value="chat">Casual Chat</option>
                    <option value="medical">Medical / Clinical</option>
                    <option value="food">Ordering Food</option>
                </select>
            </div>
            <button id="connect-btn">Connect & Start</button>
            <button id="preview-btn" style="background:#444; margin-top:10px;">Preview Design Only</button>
        </div>
    </div>

    <!-- Main Speller Overlay -->
    <div id="speller-container" class="hidden">
        
        <!-- Top Section: LLM Predictions (SSVEP) -->
        <div id="top-section" class="section">
            <div id="pred-1" class="prediction-box">
                <span class="pred-text"></span>
                <div class="ssvep-freq-target" data-freq="10"></div>
            </div>
            <div id="pred-2" class="prediction-box">
                <span class="pred-text"></span>
                <div class="ssvep-freq-target" data-freq="12"></div>
            </div>
            <div id="pred-3" class="prediction-box">
                <span class="pred-text"></span>
                <div class="ssvep-freq-target" data-freq="15"></div>
            </div>
        </div>

        <!-- Middle Section: Text Display -->
        <div id="middle-section" class="section">
            <div id="text-display">
                <span id="typed-text"></span><span class="cursor">_</span>
            </div>
        </div>

        <!-- Bottom Section: P300 Matrix -->
        <div id="bottom-section" class="section">
            <table id="p300-matrix">
                <!-- 6x6 grid will be generated by app.js -->
            </table>
        </div>

    </div>

    <!-- Photodiode Synchronization Box -->
    <div id="photodiode" class="hidden"></div>

    <script src="app.js"></script>
</body>
</html>
