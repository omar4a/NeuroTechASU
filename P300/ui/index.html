<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCI P300 Speller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Pre-connection Modal -->
    <div id="connection-modal" class="modal">
        <div class="modal-content">
            <h2>BCI P300 Setup</h2>
            <div class="form-group">
                <label for="ws-url">WebSocket URL:</label>
                <input type="text" id="ws-url" value="ws://localhost:8765">
            </div>
            <div class="form-group">
                <label for="mode-selector">Flashing Paradigm:</label>
                <select id="mode-selector">
                    <option value="1">Mode 1: Row-Column (RCP)</option>
                    <option value="2">Mode 2: Checkerboard (CBP)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="algo-selector">Inference Algorithm:</label>
                <select id="algo-selector">
                    <option value="xdawn_lda">xDAWN + LDA</option>
                    <option value="riemann_mdm">Riemannian MDM</option>
                </select>
            </div>
            <button id="connect-btn">Connect for Training</button>
            <button id="inference-btn" style="background:#00aaff; color:white; margin-top:10px; width:100%; padding:12px; border:none; border-radius:4px; font-weight:bold; font-size:16px; cursor:pointer;">Connect for Real-Time Spelling</button>
            <button id="preview-btn" style="background:#444; margin-top:10px; width:100%; padding:12px; border:none; border-radius:4px; font-weight:bold; font-size:16px; cursor:pointer; color: #fff;">Preview UI Only</button>
        </div>
    </div>

    <!-- Main Speller Overlay -->
    <div id="speller-container" class="hidden">
        
        <!-- Header Section: Display Target Word or typed text -->
        <div id="header-section" class="section">
            <div id="instruction-display">Waiting for experiment to start...</div>
            <div id="text-display">
                <span id="typed-text"></span><span class="cursor">_</span>
            </div>
        </div>

        <!-- Middle Section: P300 Matrix -->
        <div id="matrix-section" class="section">
            <table id="p300-matrix">
                <!-- 6x6 grid generated by app.js -->
            </table>
        </div>

    </div>

    <!-- Photodiode Synchronization Box -->
    <div id="photodiode" class="hidden"></div>

    <script src="app.js"></script>
</body>
</html>
